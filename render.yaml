services:
  - type: web
    name: investment-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 app:app
    envVars:
      - key: FRED_API_KEY
        sync: false          # you'll enter this manually in the Render dashboard
      - key: REDIS_URL
        fromService:
          name: investment-dashboard-redis
          type: redis
          property: connectionString

  - type: redis
    name: investment-dashboard-redis
    plan: free
    ipAllowList: []          # internal access only
